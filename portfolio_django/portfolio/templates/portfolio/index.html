{% extends 'portfolio/base.html' %}
{% block content %}

<style>
    .hero {
        text-align: center;
        margin-bottom: 56px;
    }

    .hero h1 {
        font-size: 42px;
        color: white;
        margin-bottom: 10px;
    }

    .hero p {
        color: #787890;
        font-size: 16px;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
    }

    .card {
        background: #161620;
        border: 1px solid #2a2a3a;
        border-radius: 10px;
        padding: 24px 16px;
        text-decoration: none;
        color: #dcdce6;
        transition: border-color 0.2s, background 0.2s;
    }

    .card:hover {
        border-color: #64a0ff;
        background: #1a1a28;
    }

    .card .num {
        color: #64a0ff;
        font-size: 13px;
        margin-bottom: 8px;
    }

    .card .name {
        font-size: 15px;
        font-weight: 600;
        color: white;
    }
</style>

<div class="hero">
    <h1>Портфолио</h1>
    <p>Атығай Дамир — Python / Django / Gamedev</p>
</div>

<div class="grid">
    {% for slug, name in menu %}
    <a class="card" href="/{{ slug }}/">
        <div class="num">0{{ forloop.counter }}</div>
        <div class="name">{{ name }}</div>
    </a>
    {% endfor %}
</div>

{% endblock %}
