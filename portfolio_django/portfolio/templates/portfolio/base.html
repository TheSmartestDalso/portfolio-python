<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Портфолио — Дамир</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0d0d12;
            color: #dcdce6;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        nav {
            background: #161620;
            padding: 14px 40px;
            border-bottom: 1px solid #2a2a3a;
        }

        nav .logo {
            color: white;
            font-weight: bold;
            font-size: 16px;
            text-decoration: none;
        }

        .container {
            max-width: 860px;
            margin: 0 auto;
            padding: 48px 24px;
        }
    </style>
</head>
<body>
<nav>
    <a class="logo" href="/">Атығай Дамир</a>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>
</body>
</html>
